apiVersion: apps/v1
kind: Deployment
metadata:
  name: insightops-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insightops-frontend
  template:
    metadata:
      labels:
        app: insightops-frontend
    spec:
      containers:
      - name: frontend
        image: insightops-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5173

---
apiVersion: v1
kind: Service
metadata:
  name: insightops-frontend-service
spec:
  selector:
    app: insightops-frontend
  ports:
  - port: 5173
    targetPort: 5173
  type: NodePort
