apiVersion: apps/v1
kind: Deployment
metadata:
  name: insightops-backend

spec:
  replicas: 1
  selector:
    matchLabels:
      app: insightops-backend

  template:
    metadata:
      labels:
        app: insightops-backend

    spec:
      containers:
      - name: backend
        image: insightops-backend:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 5000

        env:
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_NAME
          value: "insightops"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "Hardik@123"

---
apiVersion: v1
kind: Service
metadata:
  name: insightops-backend-service

spec:
  selector:
    app: insightops-backend

  ports:
    - port: 5000
      targetPort: 5000

  type: NodePort
