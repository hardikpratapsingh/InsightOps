version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: insightops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Hardik@123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: postgres
      DB_NAME: insightops
      DB_USER: postgres
      DB_PASSWORD: Hardik@123
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5174:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: